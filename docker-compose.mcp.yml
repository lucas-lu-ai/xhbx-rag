version: "2.4"

x-mcp-service: &mcp-service
  image: xhbx-rag-mcp:latest
  platform: ${DOCKER_PLATFORM:-linux/amd64}
  build:
    context: .
    dockerfile: Dockerfile.api
  env_file:
    - .env.mcp
  environment:
    MILVUS_MODE: docker
    MILVUS_URI: http://standalone:19530
    MILVUS_COLLECTION: ${MILVUS_COLLECTION:-xhbx_knowledge_chunks}
    MILVUS_COURSE_COLLECTION: ${MILVUS_COURSE_COLLECTION:-xhbx_course_chunks}
  volumes:
    - ./data:/app/data:ro
    - ./generated:/app/generated
    - ./parsed:/app/parsed
    - ./scripts:/app/scripts:ro
  depends_on:
    standalone:
      condition: service_healthy

services:
  mcp:
    <<: *mcp-service
    command:
      - xhbx-rag-mcp
      - --transport
      - streamable-http
      - --host
      - 0.0.0.0
      - --port
      - "9331"
      - --path
      - /mcp
    ports:
      - "${MCP_BIND:-127.0.0.1}:${MCP_PORT:-9331}:9331"
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import socket; s=socket.create_connection(('127.0.0.1', 9331), timeout=5); s.close()"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  etcd:
    image: quay.io/coreos/etcd:v3.5.25
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command:
      - etcd
      - -advertise-client-urls=http://etcd:2379
      - -listen-client-urls
      - http://0.0.0.0:2379
      - --data-dir
      - /etcd
    volumes:
      - milvus_etcd:/etcd
    healthcheck:
      test:
        - CMD
        - etcdctl
        - endpoint
        - health
      interval: 30s
      timeout: 20s
      retries: 3

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command:
      - minio
      - server
      - /minio_data
      - --console-address
      - ":9001"
    volumes:
      - milvus_minio:/minio_data
    healthcheck:
      test:
        - CMD
        - mc
        - ready
        - local
      interval: 30s
      timeout: 20s
      retries: 3

  standalone:
    image: milvusdb/milvus:v2.6.19
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    command:
      - milvus
      - run
      - standalone
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MQ_TYPE: woodpecker
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "127.0.0.1:${MILVUS_PORT:-19530}:19530"
      - "127.0.0.1:${MILVUS_HEALTH_PORT:-9091}:9091"
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - curl
        - -f
        - http://localhost:9091/healthz
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3

volumes:
  milvus_etcd:
  milvus_minio:
  milvus_data:
