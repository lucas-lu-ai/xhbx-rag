apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: xhbx-rag
spec:
  type: ClusterIP
  selector:
    app: api
  ports:
    - name: http
      port: 8000
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: xhbx-rag
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      nodeSelector:
        xhbx-rag/offline: "true"
      containers:
        - name: api
          image: localhost/xhbx-rag-api:offline
          imagePullPolicy: Never
          command:
            - uvicorn
          args:
            - xhbx_rag.web.app:app
            - --host
            - 0.0.0.0
            - --port
            - "8000"
          envFrom:
            - configMapRef:
                name: xhbx-rag-config
            - secretRef:
                name: xhbx-rag-secrets
          ports:
            - name: http
              containerPort: 8000
          readinessProbe:
            httpGet:
              path: /api/status
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/status
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "4"
              memory: 8Gi
          volumeMounts:
            - name: api-data
              mountPath: /app/data
            - name: api-local
              mountPath: /app/.local
      volumes:
        - name: api-data
          persistentVolumeClaim:
            claimName: api-data
        - name: api-local
          persistentVolumeClaim:
            claimName: api-local
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: xhbx-rag
spec:
  type: ClusterIP
  selector:
    app: web
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: xhbx-rag
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      nodeSelector:
        xhbx-rag/offline: "true"
      containers:
        - name: web
          image: localhost/xhbx-rag-web:offline
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
